<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Addition Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 300px;
      background-color: lightskyblue;
    }
    input[type="number"] {
      padding: 8px;
      margin: 5px;
      width: 160px;
    }
    button {
      padding: 8px 12px;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
    }

  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>Kalkulacka Najmensieho Spolocneho Nasobku</h1>

  <div id="g_id_onload"
     data-client_id="322952334301-5bu0bcbnc0b4ou5fr0ceo3a9f1b27hs7.apps.googleusercontent.com"
     data-callback="handleCredentialResponse">
  </div>

 <div class="g_id_signin" data-type="standard"></div>
 
  <input type="number" id="num1" placeholder="Zadaj prve cislo">
  <input type="number" id="num2" placeholder="Zadaj druhe cislo">
  <button onclick="calculateSum()">Vypocitaj NSN</button>

  <div class="result" id="result"></div>

  <script>
    function gcd(a, b) {
    return b === 0 ? a : gcd(b, a % b);
    }

    function lcm(a, b) {
    return (a * b) / gcd(a, b);
    }
    function calculateSum() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      //const sum = num1 + num2;
      const sum = lcm(num1, num2);
      document.getElementById('result').textContent = `NSN: ${sum}`;
    }
  </script>
</body>
</html>
